<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notiz App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="notes-app-container">
      <div class="notes-app-content">
        <div class="nav-mobile-tablet">
          <button class="new-note">
            <img
              src="img/newNote.svg"
              alt="Neue Notiz erstellen"
              class="btn-icon"
            /></button
          ><button onclick="saveNote()" class="save-note">
            <img
              src="img/archive.svg"
              alt="Notiz zum Archiv hinzufügen"
              class="btn-icon"
            /></button
          ><button class="delete-note">
            <img src="img/trash.svg" alt="Notiz löschen" class="btn-icon" />
          </button>
        </div>
        <div class="nav-left-sidebar">
          <div class="create-note">
            <button class="new-note">
              <img
                src="img/newNote.svg"
                alt="Neue Notiz erstellen"
                class="btn-icon"
              />
            </button>
          </div>
          <div class="storage-desktop"></div>
        </div>
        <div class="main-content">
          <div class="main-title-and-save">
            <input
              type="text"
              id="note-title-input"
              placeholder="Überschrift eingeben..."
            />
            <button class="save-note">
              <img
                src="img/archive.svg"
                alt="Notiz zum Archiv hinzufügen"
                class="btn-icon"
              />
            </button>
            <button class="delete-note">
              <img src="img/trash.svg" alt="Notiz löschen" class="btn-icon" />
            </button>
          </div>
          <textarea
            id="note-content-input"
            placeholder="Erstelle eine Notiz"
          ></textarea>
        </div>
        <div class="storage-mobile"></div>
      </div>
    </div>
    <script src="notesAPI.js"></script>
    <script src="main.js"></script>
  </body>
</html>
